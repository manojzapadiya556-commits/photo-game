<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Manoj Photo Rush Pro</title>

    <style>
        :root {
            --primary: #facc15;
            --danger: #ef4444;
            --bg: #020617;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif; color: white;
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s; z-index: 20;
        }

        #game-screen { display: none; z-index: 10; }

        #home-screen {
            z-index: 50;
            background: radial-gradient(circleAt center, #1e293b 0%, #020617 100%);
        }

        .title {
            font-size: 70px; font-weight: 900; color: var(--primary);
            text-shadow: 0 0 20px rgba(250, 204, 21, 0.5);
            margin-bottom: 10px; animation: float 3s ease-in-out infinite;
        }

        .developer {
            font-size: 20px; color: #94a3b8; margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .high-score-display {
            font-size: 24px; color: #4ade80; margin-bottom: 30px;
            border: 1px solid #4ade80; padding: 10px 25px; border-radius: 50px;
        }

        .btn {
            padding: 15px 50px; font-size: 22px; font-weight: bold;
            background: var(--primary); color: black; border: none;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 0 #a16207; margin: 10px;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 13px 0 #a16207; }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #a16207; }

        .stats { position: absolute; top: 20px; padding: 15px; background: rgba(0,0,0,0.7); border-radius: 12px; border: 1px solid #334155; }
        .stats-left { left: 20px; } .stats-right { right: 20px; }

        .falling-photo {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            object-fit: cover;
            cursor: pointer;
        }

        .bomb {
            position: absolute;
            width: 70px; height: 70px;
            background: #ef4444;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px;
            cursor: pointer;
            border: 4px solid #7f1d1d;
            box-shadow: 0 0 20px #ef4444;
        }

        .falling-photo, .bomb {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #level-tag {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            padding: 8px 25px;
            border-radius: 50px;
        }

        #game-over-screen {
            display: none;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .over-box {
            background: #0f172a;
            padding: 50px;
            border-radius: 30px;
            border: 4px solid var(--primary);
            text-align: center;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>

<body>

<div id="home-screen" class="screen">
    <div class="title">Click On Photos to Get Points</div>
    <div class="developer">Developed by Manoj Zapadiya</div>
    <div class="high-score-display">🏆 High Score: <span id="home-high-score">0</span></div>
    <button class="btn" id="startBtn">START GAME</button>
</div>

<div id="game-screen" class="screen">
    <div class="stats stats-left">
        <div style="color:var(--primary); font-size:28px; font-weight:bold;">Score: <span id="score">0</span></div>
        <div style="color:var(--danger)">Lives: <span id="lives">10</span></div>
    </div>

    <div class="stats stats-right">
        <div style="color:#4ade80; font-size:20px;">Record: <span id="game-high-score">0</span></div>
    </div>

    <div id="level-tag" style="border: 2px solid #4ade80; color: #4ade80;">Level: Easy</div>

    <div id="game-area" style="width:100%; height:100%; position:relative;"></div>
</div>

<div id="game-over-screen" class="screen">
    <div class="over-box">
        <h1 style="color:var(--danger); font-size:50px;">GAME OVER</h1>
        <h2>Score: <span id="final-score">0</span></h2>
        <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        <button class="btn" onclick="goHome()">HOME</button>
    </div>
</div>

<script>
    const isMobile = window.innerWidth < 600;

const userImg = "./photo.jpg";

let score = 0, lives = 10, gameActive = false, gameTimer;
let highScore = localStorage.getItem('photoProScore') || 0;

// init scores
document.getElementById('home-high-score').innerText = highScore;
document.getElementById('game-high-score').innerText = highScore;

// start button
document.getElementById("startBtn").addEventListener("click", startGame);

function startGame() {
    score = 0;
    lives = 10;
    gameActive = true;

    document.getElementById('score').innerText = "0";
    document.getElementById('lives').innerText = "10";

    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';

    document.getElementById('game-area').innerHTML = '';

    updateDifficulty();
}

function goHome() {
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('home-screen').style.display = 'flex';
    document.getElementById('home-high-score').innerText = highScore;
}

function updateDifficulty() {
    clearInterval(gameTimer);

    let rate = 1000, minS = 3, maxS = 5, bomb = 0.05;
    let lvl = "Easy", clr = "#4ade80";

    if (score >= 40) {
        rate = 200; minS = 12; maxS = 18; bomb = 0.40;
        lvl = "GOD MODE 💀"; clr = "#ef4444";
    }
    else if (score >= 30) {
        rate = 400; minS = 8; maxS = 12; bomb = 0.25;
        lvl = "IMPOSSIBLE 🚫"; clr = "#ef4444";
    }
    else if (score >= 20) {
        rate = 600; minS = 6; maxS = 9; bomb = 0.15;
        lvl = "HARD 🔴"; clr = "#fb923c";
    }
    else if (score >= 10) {
        rate = 800; minS = 4; maxS = 7; bomb = 0.10;
        lvl = "MEDIUM 🟠"; clr = "#facc15";
    }

    // ✅ MOBILE AUTO ADJUSTMENT
    if (isMobile) {
        rate += 200;        // slower spawn
        minS *= 0.7;        // slower speed
        maxS *= 0.7;
        bomb *= 0.8;        // fewer bombs
    }

    // level UI
    const tag = document.getElementById('level-tag');
    tag.innerText = "Level: " + lvl;
    tag.style.borderColor = clr;
    tag.style.color = clr;

    if (gameActive) {
        gameTimer = setInterval(() => createItem(minS, maxS, bomb), rate);
    }
}
    // ✅ FIX: update level UI
    const tag = document.getElementById('level-tag');
    tag.innerText = "Level: " + lvl;
    tag.style.borderColor = clr;
    tag.style.color = clr;

    if (gameActive) {
        gameTimer = setInterval(() => createItem(minS, maxS, bomb), rate);
    }
}

function createItem(minS, maxS, bombChance) {
    if (!gameActive) return;

    const isBomb = Math.random() < bombChance;
    const item = document.createElement(isBomb ? 'div' : 'img');

    item.className = isBomb ? 'bomb' : 'falling-photo';

    if (isBomb) {
        item.innerHTML = '💣';
    } else {
        item.src = userImg;

        // ✅ FIX: responsive size
        let size;
        if (window.innerWidth < 600) {
            size = Math.floor(Math.random() * 30) + 60;
        } else {
            size = Math.floor(Math.random() * 40) + 70;
        }

        item.style.width = size + 'px';
        item.style.height = size + 'px';
    }

    item.style.left = Math.random() * (window.innerWidth - 100) + 'px';
    item.style.top = '-150px';

    document.getElementById('game-area').appendChild(item);

    let top = -150;
    let speed = Math.random() * (maxS - minS) + minS;

// extra mobile smoothness
if (isMobile) {
    speed *= 0.8;
}

    const fall = setInterval(() => {
        if (!gameActive) {
            clearInterval(fall);
            item.remove();
            return;
        }

        top += speed;
        item.style.top = top + 'px';

        if (top > window.innerHeight) {
            clearInterval(fall);
            item.remove();

            if (!isBomb) {
                lives--;
                document.getElementById('lives').innerText = lives;

                if (lives <= 0) endGame("Thanks from Manoj");
            }
        }
    }, 20);

    // ✅ FIX: better click handling
    item.addEventListener("click", function(e) {
        e.stopPropagation();

        if (isBomb) {
            endGame("Never Click on Bombs 💥");
        } else {
            score++;
            document.getElementById('score').innerText = score;

            item.remove();
            clearInterval(fall);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('photoProScore', highScore);
                document.getElementById('game-high-score').innerText = highScore;
            }

            updateDifficulty();
        }
    });
}

function endGame(reason) {
    gameActive = false;
    clearInterval(gameTimer);

    document.getElementById('game-over-screen').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
    document.getElementById('death-reason').innerText = reason;
}
</script>


</body>
</html>
